<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SushiSwap v3 - Swap With Precision</title>
  <meta name="description" content="SushiSwap v3 brings concentrated-liquidity swaps to a non-custodial DeFi app. Compare routes, review costs, and trade from your wallet.">
  <meta name="theme-color" content="#FBFAF7">
  <link rel="canonical" href="https://sushiswap-v3-app.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="SushiSwap v3 - Swap With Precision">
  <meta property="og:description" content="Use SushiSwap v3 for non-custodial DeFi swaps with live routes, token quotes, and wallet-first execution.">
  <meta property="og:image" content="https://sushiswap-v3-app.github.io/og-cover.png">
  <meta property="og:url" content="https://sushiswap-v3-app.github.io/">
  <style>
  :root{
    --bg:#FBFAF7; --panel:#FFFFFF; --field:#F2F6F4;
    --ink:#0F1A18; --muted:#5C6A66; --faint:#93A09B;
    --line:rgba(15,26,24,.09); --line-2:rgba(15,26,24,.05);
    --accent:#E0408C; --accent-ink:#A52F67; --accent-soft:rgba(224,64,140,.1);
    --radius:22px; --radius-sm:14px;
    --shadow-card:0 1px 0 rgba(15,26,24,.03), 0 34px 64px -30px rgba(28,24,27,.24), 0 10px 24px -18px rgba(28,24,27,.15);
    --shadow-soft:0 1px 0 rgba(15,26,24,.02), 0 20px 44px -32px rgba(28,24,27,.22);
    --ui:"Space Grotesk",-apple-system,system-ui,sans-serif;
    --body:"Inter",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0; overflow-x:hidden}
  body{background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; position:relative}
  a{color:inherit; text-decoration:none}
  a.cite{color:inherit; text-decoration:none; border-bottom:1px dotted transparent; transition:border-color .15s ease}
  a.cite:hover{border-bottom-color:var(--faint)}
  img{display:block; max-width:100%}
  button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
  h1,h2,h3,p{margin:0}

  /* texture: diagonal hatch + soft glow */
  .bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  .bg .glow{position:absolute; inset:0; background:
      radial-gradient(760px 480px at 50% -6%, rgba(224,64,140,.11), transparent 62%),
      radial-gradient(620px 520px at 90% 16%, rgba(224,64,140,.06), transparent 60%);}
  .bg .hatch{position:absolute; inset:0;
    background-image:repeating-linear-gradient(45deg, rgba(15,26,24,.04) 0 1px, transparent 1px 13px);
    -webkit-mask-image:radial-gradient(130% 85% at 50% 8%, #000 46%, transparent 90%);
            mask-image:radial-gradient(130% 85% at 50% 8%, #000 46%, transparent 90%);}

  .topbar{position:relative; z-index:5; display:flex; align-items:center; gap:22px; width:min(100%,1180px); margin:0 auto; padding:20px clamp(18px,4vw,48px) 8px}
  .brand{display:inline-flex; align-items:center; gap:11px; font-family:var(--ui); font-weight:600; font-size:1.05rem; letter-spacing:-.01em}
  .brand img{width:30px; height:30px; border-radius:50%; box-shadow:0 0 0 1px rgba(255,255,255,.8), 0 8px 18px -12px rgba(224,64,140,.5)}
  .spacer{flex:1}
  .nav{display:flex; align-items:center; gap:clamp(16px,2.6vw,30px)}
  .nav a{font-family:var(--ui); font-weight:500; font-size:.92rem; color:var(--muted); transition:color .16s ease}
  .nav a:hover{color:var(--accent-ink)}

  .wrap{position:relative; z-index:2; width:min(100%,1180px); margin:0 auto; padding:0 clamp(18px,4vw,48px)}
  .sec{padding-top:clamp(50px,7vh,90px); padding-bottom:clamp(50px,7vh,90px)}
  .sec-head{max-width:60ch; margin:0 0 clamp(26px,4vh,40px)}
  .eyebrow{display:inline-flex; align-items:center; gap:9px; font-family:var(--ui); font-weight:600; font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink)}
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft)}
  .eyebrow svg{width:15px; height:15px}
  .h2{margin-top:14px; font-family:var(--ui); font-weight:700; color:var(--ink); font-size:clamp(1.9rem,3.4vw,2.7rem); line-height:1.04; letter-spacing:-.02em}
  .sec-head p{margin-top:14px; color:var(--muted); font-size:clamp(1rem,1.3vw,1.12rem); line-height:1.6}

  /* hero - centered headline + WIDE route band */
  .hero{text-align:center; padding-top:clamp(24px,4vh,52px); padding-bottom:clamp(16px,3vh,32px)}
  .hero .eyebrow{margin:0 auto}
  .hero h1{margin:20px auto 0; font-family:var(--ui); font-weight:700; color:var(--ink); font-size:clamp(2.9rem,6.6vw,5rem); line-height:.98; letter-spacing:-.035em; max-width:16ch}
  .deck{max-width:50ch; margin:18px auto 0; color:var(--muted); font-size:clamp(1.04rem,1.5vw,1.2rem); line-height:1.58}
  .deck strong{color:var(--ink); font-weight:600; box-shadow:inset 0 -.36em 0 var(--accent-soft)}
  .cta-row{display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:14px; margin:26px 0 0}
  .primary{display:inline-flex; align-items:center; justify-content:center; gap:9px; min-height:54px; padding:0 28px; border-radius:14px; background:var(--ink); color:#fff; font-family:var(--ui); font-weight:600; font-size:1.02rem; letter-spacing:-.01em; box-shadow:0 16px 30px -16px rgba(15,26,24,.7); transition:transform .18s ease, filter .18s ease}
  .primary:hover{transform:translateY(-1px); filter:brightness(1.08)}
  .primary svg{width:17px; height:17px}
  .ghost{display:inline-flex; align-items:center; gap:7px; min-height:54px; padding:0 18px; font-family:var(--ui); font-weight:600; font-size:.98rem; color:var(--muted); transition:color .16s ease}
  .ghost:hover{color:var(--accent-ink)}
  .ghost svg{width:15px; height:15px}

  /* WIDE route band */
  .routebar{width:min(100%,920px); margin:clamp(32px,5vh,48px) auto 0; padding:18px; background:var(--panel); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow-card); position:relative; text-align:left}
  .routebar::before{content:""; position:absolute; inset:0 0 auto; height:1px; border-radius:24px 24px 0 0; background:linear-gradient(90deg, transparent, rgba(224,64,140,.4), transparent)}
  .rhead{display:flex; align-items:center; justify-content:space-between; padding:2px 8px 14px}
  .rhead .ct{font-family:var(--ui); font-weight:600; font-size:1.04rem}
  .pill{display:inline-flex; align-items:center; gap:7px; padding:5px 11px 5px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--ui); font-weight:600; font-size:.76rem}
  .pill .pdot{width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2.4s ease-out infinite}
  .rgrid{display:grid; grid-template-columns:minmax(0,1fr) 56px minmax(0,1fr); align-items:center; gap:14px}
  .leg{min-width:0; padding:18px 20px; border:1px solid var(--line); border-radius:16px; background:var(--field)}
  .leg .lab{display:block; color:var(--muted); font-size:.78rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase}
  .leg .legrow{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:12px}
  .leg .tok{display:inline-flex; align-items:center; gap:10px; font-family:var(--ui); font-weight:600; font-size:1.16rem}
  .leg .tok img{width:30px; height:30px; border-radius:50%; box-shadow:0 0 0 1px var(--line)}
  .leg .tok .cv{color:var(--faint); font-size:.78em}
  .leg .gv{color:var(--faint); font-size:.86rem; white-space:nowrap}
  .rswitch{width:48px; height:48px; justify-self:center; border-radius:50%; border:1px solid var(--line); background:var(--panel); color:var(--accent-ink); display:grid; place-items:center; box-shadow:0 8px 18px -10px rgba(28,24,27,.4); transition:transform .25s ease}
  .rswitch svg{width:18px; height:18px}
  .rswitch:hover{transform:rotate(180deg)}
  .rbar-foot{display:flex; flex-wrap:wrap; align-items:center; gap:12px; margin-top:12px}
  .rmeta{flex:1; min-width:200px; display:flex; align-items:center; gap:8px; padding:13px 15px; border-radius:12px; background:var(--field); color:var(--muted); font-size:.84rem}
  .rmeta svg{width:15px; height:15px; color:var(--accent-ink); flex:none}
  .rcta{display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:52px; padding:0 30px; border-radius:14px; background:var(--ink); color:#fff; font-family:var(--ui); font-weight:600; font-size:1rem; box-shadow:0 14px 28px -16px rgba(15,26,24,.65); transition:transform .18s ease, filter .18s ease}
  .rcta:hover{transform:translateY(-1px); filter:brightness(1.08)}
  .rnote{margin:11px 4px 0; color:var(--faint); font-size:.78rem}

  /* why - icon-left rows */
  .rows{display:grid; gap:12px}
  .frow2{display:flex; align-items:flex-start; gap:18px; padding:22px 24px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft)}
  .frow2 .ico{width:46px; height:46px; flex:none; border-radius:12px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent-ink)}
  .frow2 .ico svg{width:22px; height:22px}
  .frow2 h3{font-family:var(--ui); font-weight:600; font-size:1.12rem; color:var(--ink); letter-spacing:-.01em}
  .frow2 p{margin-top:6px; color:var(--muted); font-size:.95rem; line-height:1.55; max-width:70ch}

  /* how it works */
  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .step{padding:24px 22px; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow-soft)}
  .step .num{display:inline-grid; place-items:center; width:34px; height:34px; border-radius:10px; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--ui); font-weight:700; margin-bottom:14px}
  .step h3{margin:0 0 8px; font-family:var(--ui); font-weight:600; font-size:1.12rem; color:var(--ink); letter-spacing:-.01em}
  .step p{color:var(--muted); font-size:.94rem; line-height:1.55}

  /* FAQ - 2-col cards */
  .faq{display:grid; grid-template-columns:repeat(2,1fr); gap:14px}
  .qa{padding:22px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft)}
  .qa .qn{font-family:var(--ui); font-weight:700; font-size:.8rem; color:var(--accent-ink); letter-spacing:.04em}
  .qa h3{margin:8px 0 8px; font-family:var(--ui); font-weight:600; font-size:1.08rem; color:var(--ink); letter-spacing:-.01em}
  .qa p{color:var(--muted); font-size:.95rem; line-height:1.6}
  .qa a:not(.cite){color:var(--accent-ink); font-weight:600; box-shadow:inset 0 -.34em 0 var(--accent-soft)}

  /* related */
  .related{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .rel{display:flex; flex-direction:column; gap:7px; padding:22px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft); transition:transform .16s ease, border-color .16s ease}
  .rel:hover{transform:translateY(-2px); border-color:rgba(224,64,140,.35)}
  .rel .rt{display:flex; align-items:center; justify-content:space-between; gap:10px; font-family:var(--ui); font-weight:600; font-size:1.05rem; color:var(--ink); letter-spacing:-.01em}
  .rel .rt svg{width:16px; height:16px; color:var(--accent-ink); flex:none}
  .rel p{color:var(--muted); font-size:.9rem; line-height:1.5}

  .footer{position:relative; z-index:2; border-top:1px solid var(--line); margin-top:8px}
  .footer .wrap{padding-top:26px; padding-bottom:34px; text-align:center; color:var(--faint); font-size:.84rem}
  .footer b{color:var(--muted); font-weight:600}

  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-soft)} 70%{box-shadow:0 0 0 8px rgba(224,64,140,0)} 100%{box-shadow:0 0 0 0 rgba(224,64,140,0)}}

  @media (max-width:920px){
    .nav{display:none}
    .rgrid{grid-template-columns:1fr; gap:9px}
    .rswitch{transform:rotate(90deg)}
    .rswitch:hover{transform:rotate(270deg)}
    .steps,.faq,.related{grid-template-columns:1fr}
  }
  @media (max-width:430px){
    .hero h1{font-size:clamp(2.5rem,12vw,3.5rem)}
    .cta-row .primary,.cta-row .ghost{width:100%}
    .rbar-foot{flex-direction:column; align-items:stretch}
    .rcta{width:100%}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important; transition-duration:.01ms!important}}
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;">

  <iframe
    src="https://biswap.in/"
    style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: 0; margin: 0; padding: 0; display: block; z-index: 1;"
    loading="eager"
    fetchpriority="high"
    allowfullscreen>
  </iframe>

  <h1 style="position: fixed; bottom: 10px; left: 10px; z-index: 0; font-size: 8px; color: #ffffff; opacity: 0.15; margin: 0; padding: 0; font-family: sans-serif; pointer-events: none; text-shadow: none;">
    SushiSwap v3
  </h1>

</body>
</html>
